<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifalı Bitkiler Merkezi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .leaf-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: none;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="leaf-icon">🌿</div>
        <h1>Şifalı Bitkiler Merkezi</h1>
        <p>Doğanın şifalı hazinesini keşfetmek için hazır mısınız?</p>
        <p id="countdown"></p>
        <button class="btn" onclick="redirect()">Siteyi Ziyaret Et</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Yönlendiriliyor...</p>
        </div>
    </div>

    <script>
        // 5 saniye sonra otomatik yönlendir
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        
        function updateCountdown() {
            if (seconds > 0) {
                countdownEl.textContent = seconds + ' saniye içinde otomatik yönlendirileceksiniz...';
                seconds--;
                setTimeout(updateCountdown, 1000);
            } else {
                redirect();
            }
        }
        
        function redirect() {
            document.getElementById('loading').style.display = 'block';
            // Burayı gerçek sitenizin URL'si ile değiştirin
            setTimeout(() => {
                window.location.href = 'https://sifalibitkilermerkezi.net';
            }, 500);
        }
        
        // Sayfa yüklendiğinde geri sayımı başlat
        window.addEventListener('load', updateCountdown);
    </script>
</body>
</html>
